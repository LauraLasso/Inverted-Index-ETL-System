events {
    worker_connections 1024;
}

http {
    upstream backend {
        server 10.22.148.66:8080;
        server 10.22.148.71:8080;
        server 10.22.148.67:8080;
        server 10.22.148.70:8080;
        server 10.22.148.74:8080;
        server 10.22.148.73:8080;
        server 10.22.148.62:8080;
        server 10.22.148.68:8080;
        server 10.22.148.69:8080;

    }

    server {
        listen 80;
        server_name 10.22.148.70;

        location ~ ^/documents/(?<words>.+)$ {
            proxy_pass http://backend/documents/$words;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Otras configuraciones según sea necesario

        error_page 404 /404.html;
        location = /40x.html {
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
        }
    }
}

